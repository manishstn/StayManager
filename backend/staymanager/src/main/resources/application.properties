spring.application.name=staymanager
server.servlet.context-path=/stayManager
#MYSQL CONNECTION
server.port=4040
spring.datasource.url=jdbc:mysql://localhost:3306/staymanager?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update

# CORS CONFIGURATION
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173
app.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true
app.cors.max-age=3600

# Use a strong, 64-character hex or base64 string
app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
# 7 Days in milliseconds
app.jwt.expiration=604800000

# Hide the "Schemas" section at the bottom of the page
springdoc.swagger-ui.default-models-expand-depth=-1

# Show only the API endpoints by default (collapsed view)
springdoc.swagger-ui.doc-expansion=none

# Disable the "Try it out" button by default (optional)
 springdoc.swagger-ui.try-it-out-enabled=true

# Path to access the UI
springdoc.swagger-ui.path=/swagger-ui.html

# Cloudinary Configuration
cloudinary.cloud-name=${CLOUDINARY_NAME:default_name}
cloudinary.api-key=${CLOUDINARY_KEY:default_key}
cloudinary.api-secret=${CLOUDINARY_SECRET:default_secret}

# File Upload Limits (Important for Photos/PDFs)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB